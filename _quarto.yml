project:
  type: website

website:
  title: "Cookbook"
  description: "A living cookbook of software development practices, architecture patterns, and data engineering solutions."
  page-footer:
    left: "© Ahmad Hatahet"
    right: "Built with [Quarto](https://quarto.org)"
  sidebar:
    style: "floating"
    search: true
    collapse-level: 1
    contents:
      - index.qmd
      - section: "Daily Automation"
        contents: automation/*.qmd
      - section: "Architecture & Paradigms"
        contents: architecture/*.qmd

format:
  html:
    theme: litera
    css: styles.css
    toc: true
    grid:
      sidebar-width: 320px
      body-width: 850px
  pdf:
    documentclass: scrartcl
    papersize: a4
    geometry:
      - margin=1in
    fontsize: 11pt
    toc: true
    colorlinks: true
    linkcolor: NavyBlue
    urlcolor: NavyBlue
